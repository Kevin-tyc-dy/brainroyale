<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知識大逃殺 · BrainRoyale</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

/* ═══════════════════════════ TOKENS ═══════════════════════════ */
:root {
  --red:    #ff3a3a;
  --red-glow: #ff6b6b;
  --gold:   #f5c842;
  --gold-glow: rgba(245,200,66,0.4);
  --green:  #39e75f;
  --purple: #b040ff;
  --blue:   #4dabf7;
  --bg:     #0a0c14;
  --panel:  rgba(10,12,20,0.94);
  --border: rgba(255,255,255,0.08);
  --border-lit: rgba(255,255,255,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Noto Sans TC', sans-serif;
  overflow: hidden;
  color: #fff;
  height: 100vh;
  width: 100vw;
}

/* ═══════════════════════════ LOBBY ═══════════════════════════ */
#lobby-screen {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  overflow: hidden;
}

/* Animated grid background */
#lobby-screen::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(77,171,247,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(77,171,247,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridDrift 20s linear infinite;
}
@keyframes gridDrift {
  from { background-position: 0 0; }
  to   { background-position: 48px 48px; }
}

/* Glow orbs */
#lobby-screen::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 50%, rgba(176,64,255,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 500px 350px at 80% 50%, rgba(77,171,247,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.lobby-card {
  position: relative; z-index: 1;
  width: min(480px, 92vw);
  background: var(--panel);
  border: 1px solid var(--border-lit);
  border-radius: 20px;
  padding: 48px 40px 40px;
  backdrop-filter: blur(24px);
  box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
  animation: lobbyIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes lobbyIn {
  from { opacity:0; transform: translateY(32px) scale(0.95); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.lobby-logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  text-align: center;
  margin-bottom: 6px;
}

.lobby-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 42px;
  font-weight: 700;
  text-align: center;
  line-height: 1;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, #ff9f43 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.lobby-subtitle {
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
  margin-bottom: 36px;
}

.lobby-field-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px;
}

.lobby-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-lit);
  border-radius: 10px;
  padding: 14px 16px;
  color: #fff;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 16px;
}
.lobby-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(245,200,66,0.12);
}
.lobby-input::placeholder { color: rgba(255,255,255,0.2); }

.lobby-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--gold), #ff9f43);
  border: none;
  border-radius: 10px;
  color: #0a0c14;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}
.lobby-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.2s;
}
.lobby-btn:hover::before { background: rgba(255,255,255,0.1); }
.lobby-btn:active { transform: scale(0.98); }
.lobby-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.lobby-rules {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.lobby-rule-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.rule-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.rule-text { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.5; }

/* Waiting room */
#waiting-screen {
  position: fixed; inset: 0; z-index: 900;
  display: none;
  align-items: center; justify-content: center;
  background: var(--bg);
  flex-direction: column; gap: 24px;
}

.waiting-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.8);
}

.waiting-count {
  font-family: 'Rajdhani', sans-serif;
  font-size: 80px;
  font-weight: 700;
  line-height: 1;
  color: var(--gold);
  text-shadow: 0 0 40px var(--gold-glow);
}

.waiting-sub { font-size: 14px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }

/* Spinner */
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.08);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Countdown overlay */
#countdown-overlay {
  position: fixed; inset: 0; z-index: 800;
  display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
}
#countdown-overlay.active { display: flex; }
#countdown-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 200px;
  font-weight: 700;
  line-height: 1;
  color: var(--gold);
  text-shadow: 0 0 100px var(--gold-glow);
  animation: countPop 1s ease-in-out;
}
@keyframes countPop {
  0%   { transform: scale(1.5); opacity: 0; }
  20%  { transform: scale(1);   opacity: 1; }
  80%  { transform: scale(1);   opacity: 1; }
  100% { transform: scale(0.8); opacity: 0; }
}

/* Announcement banner */
#announcement-banner {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  background: rgba(245,200,66,0.12);
  border: 1px solid var(--gold);
  border-radius: 8px;
  padding: 10px 24px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  letter-spacing: 1px;
  color: var(--gold);
  display: none;
  pointer-events: none;
  animation: bannerIn 0.3s ease;
}
@keyframes bannerIn {
  from { opacity:0; transform: translateX(-50%) translateY(-8px); }
  to   { opacity:1; transform: translateX(-50%) translateY(0); }
}

/* ═══════════════════════════ HUD ═══════════════════════════ */
#hud {
  position: fixed; top: 16px; left: 16px;
  z-index: 100; pointer-events: none;
}
#player-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.45); margin-bottom: 7px;
}
#hp-display { display: flex; gap: 5px; align-items: center; }
.hp-heart { width: 22px; height: 22px; transition: all 0.3s; }
.hp-heart svg { width:100%; height:100%; }
.hp-heart.alive svg path { fill: var(--red); filter: drop-shadow(0 0 5px var(--red-glow)); }
.hp-heart.dead  svg path { fill: rgba(255,255,255,0.1); }

/* Alive counter */
#alive-counter {
  position: fixed; top: 16px; right: 16px;
  z-index: 100; text-align: right; pointer-events: none;
}
#alive-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.35);
  text-transform: uppercase;
}
#alive-count {
  font-family: 'Rajdhani', sans-serif;
  font-size: 46px; font-weight: 700; line-height: 1; color: #fff;
  text-shadow: 0 0 20px rgba(255,255,255,0.2);
}

/* Zone timer */
#zone-timer {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 100; text-align: center; pointer-events: none;
  opacity: 0; transition: opacity 0.5s;
}
#zone-timer.visible { opacity: 1; }
#zone-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--purple); text-shadow: 0 0 10px var(--purple);
}
#zone-countdown {
  font-family: 'Rajdhani', sans-serif;
  font-size: 34px; font-weight: 700;
  color: var(--purple); text-shadow: 0 0 20px var(--purple);
}

/* Kill feed */
#kill-feed {
  position: fixed; top: 80px; right: 16px;
  z-index: 100; pointer-events: none;
  display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
}
.kill-entry {
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  animation: killFeedIn 0.25s ease, killFadeOut 0.4s ease 3.5s forwards;
  white-space: nowrap;
}
@keyframes killFeedIn { from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)} }
@keyframes killFadeOut { to{opacity:0;transform:translateX(16px)} }
.kill-entry strong { color: var(--red); }

/* ═══════════════════════════ BATTLE UI ═══════════════════════════ */
#battle-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(5px);
}
#battle-overlay.active { display: flex; }

#battle-panel {
  width: min(600px, 92vw);
  background: var(--panel);
  border: 1px solid var(--border-lit);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04),
              0 0 40px rgba(245,200,66,0.06);
  animation: panelIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes panelIn {
  from { transform: scale(0.82); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

#battle-header {
  padding: 18px 24px;
  background: rgba(255,255,255,0.025);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
#battle-vs-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase;
}
#battle-opponent-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px; letter-spacing: 1px; color: rgba(255,255,255,0.75);
}
#battle-timer-bar { height: 3px; background: rgba(255,255,255,0.07); overflow: hidden; }
#battle-timer-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #ff9f43);
  transform-origin: left;
}

#battle-body { padding: 28px 24px 24px; }

#question-text {
  font-size: 18px; font-weight: 700; line-height: 1.65;
  color: #fff; margin-bottom: 22px;
}

#options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.option-btn {
  padding: 13px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px;
  color: #fff;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  cursor: pointer; text-align: left;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 10px;
}
.option-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.22);
  transform: translateY(-1px);
}
.option-btn:disabled { cursor: not-allowed; opacity: 0.5; }
.option-label {
  width: 24px; height: 24px; border-radius: 6px;
  background: rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 12px;
  flex-shrink: 0; color: rgba(255,255,255,0.7);
}
.option-btn.correct { background: rgba(57,231,95,0.18); border-color: var(--green); }
.option-btn.correct .option-label { background: var(--green); color: #000; }
.option-btn.wrong   { background: rgba(255,58,58,0.15);  border-color: var(--red); }
.option-btn.wrong .option-label   { background: var(--red);   color: #fff; }
.option-btn.selected { border-color: var(--gold); background: rgba(245,200,66,0.08); }

/* Result toast */
#battle-result-toast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 300; text-align: center; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
#battle-result-toast.show { opacity: 1; }
#result-main {
  font-family: 'Rajdhani', sans-serif;
  font-size: 72px; font-weight: 700; line-height: 1;
}
#result-main.win  { color: var(--green); text-shadow: 0 0 50px var(--green); }
#result-main.lose { color: var(--red);   text-shadow: 0 0 50px var(--red); }
#result-sub { font-size: 14px; color: rgba(255,255,255,0.55); margin-top: 8px; letter-spacing: 1px; }

/* ═══════════════════════════ ELIMINATED ═══════════════════════════ */
#eliminated-overlay {
  position: fixed; inset: 0; z-index: 150;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  background: rgba(0,0,0,0);
  pointer-events: none; transition: background 1s;
}
#eliminated-overlay.active {
  display: flex; background: rgba(0,0,0,0.55); pointer-events: all;
}
#elim-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 76px; font-weight: 700;
  color: var(--red); text-shadow: 0 0 80px var(--red);
  animation: pulseText 2s ease-in-out infinite;
}
@keyframes pulseText { 0%,100%{opacity:1} 50%{opacity:0.55} }
#elim-sub { font-size: 15px; color: rgba(255,255,255,0.45); letter-spacing: 1px; }

/* ═══════════════════════════ SPECTATE ═══════════════════════════ */
#spectate-panel {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 100; display: none;
  background: var(--panel);
  border: 1px solid var(--border-lit);
  border-radius: 14px; padding: 16px 20px;
  min-width: 340px; text-align: center;
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#spectate-panel.active { display: block; }
#spectate-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px; letter-spacing: 4px;
  color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 12px;
}
#spectate-targets { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.spectate-btn {
  padding: 6px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; color: #fff; font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}
.spectate-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
.spectate-btn.active-spectate {
  background: rgba(245,200,66,0.14); border-color: var(--gold); color: var(--gold);
}

/* ═══════════════════════════ MINIMAP ═══════════════════════════ */
#minimap {
  position: fixed; bottom: 24px; right: 24px;
  width: 148px; height: 148px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.65);
  z-index: 100; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#minimap-canvas { display: block; }
#minimap-label {
  position: absolute; bottom: 4px; left: 0; right: 0;
  text-align: center;
  font-family: 'Rajdhani', sans-serif;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(255,255,255,0.25);
  pointer-events: none;
}

/* ═══════════════════════════ ZONE WARNING ═══════════════════════════ */
#zone-warning {
  position: fixed; inset: 0; pointer-events: none; z-index: 90;
  opacity: 0; transition: opacity 0.5s;
  box-shadow: inset 0 0 100px rgba(176,64,255,0.55);
}
#zone-warning.active { animation: zonePulse 1.4s ease-in-out infinite; }
@keyframes zonePulse { 0%,100%{opacity:0} 50%{opacity:1} }

/* ═══════════════════════════ PAUSED OVERLAY ═══════════════════════════ */
#paused-overlay {
  position: fixed; inset: 0; z-index: 400;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); pointer-events: none;
}
#paused-overlay.active { display: flex; }
.paused-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 64px; font-weight: 700; letter-spacing: 10px;
  color: var(--gold); text-shadow: 0 0 60px var(--gold-glow);
  animation: pulseText 2s ease-in-out infinite;
}

/* ═══════════════════════════ WINNER SCREEN ═══════════════════════════ */
#winner-screen {
  position: fixed; inset: 0; z-index: 600;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
}
#winner-screen.active { display: flex; }
.winner-crown { font-size: 80px; animation: crownBounce 1s ease-in-out infinite; }
@keyframes crownBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.winner-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase;
}
.winner-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 64px; font-weight: 700; color: #fff;
  text-shadow: 0 0 60px rgba(255,255,255,0.3);
}
.winner-btn {
  margin-top: 16px; padding: 12px 36px;
  background: rgba(245,200,66,0.15); border: 1px solid var(--gold);
  border-radius: 10px; color: var(--gold);
  font-family: 'Rajdhani', sans-serif; font-size: 14px; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer; transition: all 0.2s;
}
.winner-btn:hover { background: rgba(245,200,66,0.25); }

/* ═══════════════════════════ GAME CONTAINER ═══════════════════════════ */
#game-container { position: fixed; inset: 0; }
</style>
</head>
<body>

<!-- ══════════ LOBBY ══════════ -->
<div id="lobby-screen">
  <div class="lobby-card">
    <div class="lobby-logo">BrainRoyale · 知識大逃殺</div>
    <div class="lobby-title">BATTLE ROYALE</div>
    <div class="lobby-subtitle">回答最快的人才能生存</div>

    <div class="lobby-field-label">你的名稱</div>
    <input class="lobby-input" id="name-input" type="text"
      placeholder="輸入你的遊戲名稱…" maxlength="12" spellcheck="false">

    <div class="lobby-field-label">房間代碼</div>
    <input class="lobby-input" id="room-input" type="text"
      placeholder="room_001" maxlength="20" spellcheck="false" value="room_001">

    <button class="lobby-btn" id="join-btn" onclick="joinGame()">進入房間</button>

    <div class="lobby-rules">
      <div class="lobby-rule-item">
        <span class="rule-icon">⚔️</span>
        <div class="rule-text">靠近對手觸發 1v1 答題對戰</div>
      </div>
      <div class="lobby-rule-item">
        <span class="rule-icon">❤️</span>
        <div class="rule-text">初始 5 滴血，答錯失去 1 滴</div>
      </div>
      <div class="lobby-rule-item">
        <span class="rule-icon">🔴</span>
        <div class="rule-text">安全圈持續縮小，待在圈外扣血</div>
      </div>
      <div class="lobby-rule-item">
        <span class="rule-icon">👑</span>
        <div class="rule-text">最後存活的玩家獲勝</div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ WAITING ROOM ══════════ -->
<div id="waiting-screen">

<script>
'use strict';
// ═══════════════════════════════════════════
//  CLIENT CONFIG
// ═══════════════════════════════════════════
const CFG = {
  MAP_W:        4800,
  MAP_H:        4800,
  MAX_HP:       5,
  COLLISION_D:  60,
  KNOCKBACK_D:  160,
  SPEED:        200,
  FOG_R:        380,
  BATTLE_MS:    15000,
  SYNC_MS:      100,
  SERVER:       window.location.origin,
  MM_SCALE:     148 / 4800,
  WALL_RADIUS:  14,
  TILE_SIZE:    32,
};

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
const state = {
  myId: null, myName: 'Player', myHp: CFG.MAX_HP,
  isAlive: true, isLocked: false, inBattle: false,
  isSpectating: false, spectateTargetId: null,
  remotePlayers: new Map(),
  aliveCount: 0, zoneData: null,
  battleTimerRef: null, zoneTimerRef: null,
  gameStarted: false,
  mapData: null, wallTiles: null,
  spawnX: null, spawnY: null,
};

let socket = null;
let phaserGame = null;
let gameScene = null;

// ═══════════════════════════════════════════
//  LOBBY
// ═══════════════════════════════════════════
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinGame();
});

function joinGame() {
  const name   = document.getElementById('name-input').value.trim();
  const roomId = document.getElementById('room-input').value.trim() || 'room_001';
  if (!name) { document.getElementById('name-input').focus(); return; }

  state.myName = name;
  document.getElementById('join-btn').disabled = true;

  // Connect socket
  socket = io(CFG.SERVER, { query: { role: 'player' } });

  socket.on('connect', () => {
    socket.emit('player:join', { name, roomId });
    showWaiting();
  });

  socket.on('connect_error', () => {
    document.getElementById('join-btn').disabled = false;
    alert('無法連線至伺服器，請確認伺服器已啟動。');
  });

  setupSocketEvents();
}

function showWaiting() {
  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('waiting-screen').style.display = 'flex';
}

function startCountdown(cb) {
  document.getElementById('waiting-screen').style.display = 'none';
  const overlay = document.getElementById('countdown-overlay');
  const numEl   = document.getElementById('countdown-num');
  let n = 3;
  overlay.classList.add('active');
  numEl.textContent = n;

  const iv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(iv);
      overlay.classList.remove('active');
      cb();
    } else {
      numEl.style.animation = 'none';
      void numEl.offsetWidth;
      numEl.style.animation = 'countPop 1s ease-in-out';
      numEl.textContent = n;
    }
  }, 1000);
}

// ═══════════════════════════════════════════
//  SOCKET EVENTS
// ═══════════════════════════════════════════
function setupSocketEvents() {

  socket.on('player:init', ({ id, x, y, name, mapData }) => {
    state.myId   = id;
    state.myName = name;
    state.spawnX = x;
    state.spawnY = y;
    document.getElementById('player-name').textContent = name.toUpperCase();
    if (mapData) {
      state.mapData   = mapData;
      state.wallTiles = new Set(mapData.walls.map(([gx,gy]) => gx+','+gy));
    } else {
      state.mapData = null; state.wallTiles = null;
    }
  });

  socket.on('teacher:world_update_count', ({ count }) => {
    document.getElementById('waiting-count').textContent = count;
  });

  socket.on('world:update', ({ players, aliveCount }) => {
    state.aliveCount = aliveCount;
    document.getElementById('alive-count').textContent = aliveCount;
    if (gameScene) gameScene.onWorldUpdate(players);
  });

  socket.on('map:load', ({ mapData }) => {
    if (mapData) {
      state.mapData   = mapData;
      state.wallTiles = new Set(mapData.walls.map(([gx,gy]) => gx+','+gy));
    } else {
      state.mapData = null; state.wallTiles = null;
    }
    // 若 Phaser 場景已存在（遊戲進行中才收到），立即重建地形和牆壁
    if (gameScene) {
      gameScene._buildTerrain();
      gameScene._buildWalls();
    }
  });

  socket.on('game:countdown', () => {
    if (!state.gameStarted) {
      state.gameStarted = true;
      startCountdown(() => initPhaserGame());
    }
  });

  socket.on('game:paused', ({ paused }) => {
    document.getElementById('paused-overlay').classList.toggle('active', paused);
    if (gameScene) gameScene.setPaused(paused);
  });

  socket.on('game:announcement', ({ message }) => {
    showAnnouncement(message);
  });

  socket.on('game:force_ended', ({ message }) => {
    showAnnouncement('教師已結束本局遊戲');
  });

  socket.on('battle:start', data => {
    if (gameScene) gameScene.onBattleStart(data);
  });

  socket.on('battle:result', result => {
    if (gameScene) gameScene.onBattleResult(result);
  });

  socket.on('player:knockback', ({ myNewPos }) => {
    if (gameScene) gameScene.onKnockback(myNewPos);
  });

  socket.on('player:hp_update', ({ playerId, newHp, source }) => {
    if (playerId !== state.myId) return;
    state.myHp = newHp;
    if (gameScene) gameScene.updateHpDisplay(newHp);
    if (source === 'zone') triggerZoneWarning();
  });

  socket.on('player:eliminated', ({ spectateTargets }) => {
    state.isAlive      = false;
    state.isSpectating = true;
    showEliminatedUI(spectateTargets);
    addKillFeed('你被淘汰了', true);
  });

  socket.on('player:position_correct', ({ x, y }) => {
    if (gameScene) gameScene.correctPosition(x, y);
  });

  socket.on('teacher:eliminated', ({ playerName }) => {
    addKillFeed(`<strong>${esc(playerName)}</strong> 被淘汰`);
  });

  socket.on('spectate:sync', ({ targetId, x, y }) => {
    if (state.spectateTargetId === targetId && gameScene) {
      gameScene.spectateMove(x, y);
    }
  });

  socket.on('zone:update', zoneData => {
    state.zoneData = zoneData;
    updateZoneTimer(zoneData.shrinkAt);
  });

  socket.on('game:winner', ({ winnerId, winnerName }) => {
    showWinnerScreen(winnerName, winnerId === state.myId);
  });

  socket.on('game:kicked', () => {
    alert('你已被教師移除。');
    location.reload();
  });
}

// ═══════════════════════════════════════════
//  CLIENT-SIDE WALL CHECK
// ═══════════════════════════════════════════
function clientWallCheck(px, py) {
  if (!state.wallTiles || state.wallTiles.size === 0) return false;
  const ts = state.mapData?.tileSize || CFG.TILE_SIZE;
  const gx = Math.floor(px / ts);
  const gy = Math.floor(py / ts);
  for (let dy=-1; dy<=1; dy++) {
    for (let dx=-1; dx<=1; dx++) {
      if (!state.wallTiles.has((gx+dx)+','+(gy+dy))) continue;
      const wx=(gx+dx)*ts, wy=(gy+dy)*ts;
      if (px+CFG.WALL_RADIUS>wx && px-CFG.WALL_RADIUS<wx+ts &&
          py+8>wy && py-32<wy+ts) return true;
    }
  }
  return false;
}

// ═══════════════════════════════════════════
//  PHASER INIT
// ═══════════════════════════════════════════
function initPhaserGame() {
  buildHpDisplay();

  class GameScene extends Phaser.Scene {
    constructor() {
      super('GameScene');
      this.localPlayer = null;
      this.localLabel  = null;
      this.fog         = null;
      this.zoneGfx     = null;
      this.keys        = null;
      this.lastSync    = 0;
      this.isPaused    = false;
      this.mmCtx       = document.getElementById('minimap-canvas').getContext('2d');
      gameScene = this;
    }

    preload() {
      // ── Helper functions (defined here, accessible in create/update via closure) ──
      function lighten(hex) {
        let c = hex.replace('#','');
        if(c.length===3) c=c.split('').map(x=>x+x).join('');
        const r=Math.min(255,parseInt(c.slice(0,2),16)+35);
        const g2=Math.min(255,parseInt(c.slice(2,4),16)+35);
        const b=Math.min(255,parseInt(c.slice(4,6),16)+35);
        return `rgb(${r},${g2},${b})`;
      }
      window._lighten = lighten; // expose for create()

      function drawCharFrame(ctx, skinColor, shirtColor, pantsColor, legPhase) {
        const p = (x,y,w,h,c,a=1) => {
          ctx.globalAlpha = a; ctx.fillStyle = c;
          ctx.fillRect(x, y, w, h); ctx.globalAlpha = 1;
        };
        const swing = Math.sin(legPhase * Math.PI * 2 / 8);
        const lLegY = 28 + Math.round(swing * 4);
        const rLegY = 28 - Math.round(swing * 4);
        p(12, lLegY+10, 7, 4, '#1a1a2e');
        p(12, lLegY,    7, 11, pantsColor);
        p(29, rLegY+10, 7, 4, '#1a1a2e');
        p(29, rLegY,    7, 11, pantsColor);
        p(13, 20, 22, 14, shirtColor);
        p(15, 20, 18,  3, lighten(shirtColor));
        p(13, 32, 22,  3, '#5c3a1e');
        const armSwing = -swing;
        const lArmY = 22 + Math.round(armSwing * 3);
        const rArmY = 22 - Math.round(armSwing * 3);
        p(7,  lArmY,    7, 12, skinColor);
        p(7,  lArmY+10, 7,  4, lighten(skinColor));
        p(34, rArmY,    7, 12, skinColor);
        p(34, rArmY+10, 7,  4, lighten(skinColor));
        p(14, 4, 20, 18, skinColor);
        p(14, 4, 20,  6, '#2c1810');
        p(14, 4,  4, 10, '#2c1810');
        p(17, 12, 4, 4, '#ffffff'); p(27, 12, 4, 4, '#ffffff');
        p(18, 13, 2, 2, '#222');    p(28, 13, 2, 2, '#222');
        p(20, 18, 8, 2, '#c0634a');
        p(12, 11, 3, 5, skinColor); p(33, 11, 3, 5, skinColor);
        if (shirtColor === '#3a7bd5') {
          p(35, 21, 8, 12, '#f0a500'); p(36, 33, 6, 3, '#d4891a');
        }
      }
      window._drawCharFrame = drawCharFrame; // expose for create()

      // ── Generate 8 hero frames (independent 48×48 canvas each) ──
      for (let i = 0; i < 8; i++) {
        const cv = document.createElement('canvas');
        cv.width = cv.height = 48;
        drawCharFrame(cv.getContext('2d'), '#f4a261','#3a7bd5','#2d3a7c', i);
        this.textures.addCanvas('hero_f' + i, cv);
      }

      // ── Generate 8 enemy frames ──
      for (let i = 0; i < 8; i++) {
        const cv = document.createElement('canvas');
        cv.width = cv.height = 48;
        drawCharFrame(cv.getContext('2d'), '#e8956d','#c0392b','#5d1a1a', i);
        this.textures.addCanvas('enemy_f' + i, cv);
      }

      // ── Ghost (eliminated) ──
      const gc = document.createElement('canvas');
      gc.width = gc.height = 48;
      const gctx = gc.getContext('2d');
      gctx.globalAlpha = 0.35;
      drawCharFrame(gctx, '#aaaaaa','#888888','#666666', 0);
      gctx.globalAlpha = 1;
      this.textures.addCanvas('pghost', gc);

      // ── Ground tile ──
      const gndC = document.createElement('canvas');
      gndC.width = gndC.height = 48;
      const gnd = gndC.getContext('2d');
      gnd.fillStyle = '#5a8a30'; gnd.fillRect(0,0,48,48);
      gnd.fillStyle = '#4e7a28'; gnd.fillRect(0,0,24,24); gnd.fillRect(24,24,24,24);
      gnd.fillStyle = '#6da038';
      const grng = new Phaser.Math.RandomDataGenerator(['gr']);
      for(let i=0;i<10;i++) gnd.fillRect(grng.between(2,44),grng.between(2,44),2,grng.between(3,6));
      gnd.fillStyle = 'rgba(255,255,255,0.06)';
      gnd.fillRect(8,18,3,3); gnd.fillRect(32,10,2,2); gnd.fillRect(20,36,4,2);
      this.textures.addCanvas('ground', gndC);

      // ── Path tile ──
      const pthC = document.createElement('canvas');
      pthC.width = pthC.height = 48;
      const pth = pthC.getContext('2d');
      pth.fillStyle = '#a0845c'; pth.fillRect(0,0,48,48);
      this.textures.addCanvas('path', pthC);

      // ── Shadow ──
      const shdC = document.createElement('canvas');
      shdC.width = 36; shdC.height = 12;
      const shd = shdC.getContext('2d');
      const grad = shd.createRadialGradient(18,6,0,18,6,18);
      grad.addColorStop(0,'rgba(0,0,0,0.35)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      shd.fillStyle = grad; shd.fillRect(0,0,36,12);
      this.textures.addCanvas('shadow', shdC);
    }

    create() {
      // World bounds
      this.physics.world.setBounds(0,0,CFG.MAP_W,CFG.MAP_H);

      // ── Depth: 0 地面 | 1 小路 | 2 地形 | 3 牆壁 | 4 預設樹 | 5 縮圈 | 9+ 玩家 ──

      // 地面
      this.add.tileSprite(0,0,CFG.MAP_W,CFG.MAP_H,'ground').setOrigin(0,0).setDepth(0);

      // 小路（有地形資料時隱藏）
      if (!state.mapData?.terrain?.length) {
        this.add.tileSprite(CFG.MAP_W/2,0, 80,CFG.MAP_H,'path').setOrigin(0.5,0).setDepth(1);
        this.add.tileSprite(0,CFG.MAP_H/2, CFG.MAP_W,80,'path').setOrigin(0,0.5).setDepth(1);
      }

      // 地形素材（depth 2）
      this.terrainGfx = this.add.graphics().setDepth(2);
      this._buildTerrain();

      // 牆壁（depth 3）
      this.wallGroup = this.physics.add.staticGroup();
      this.wallGfx   = this.add.graphics().setDepth(3);
      if (state.mapData?.walls?.length) this._buildWalls();

      // 預設樹木（有地形資料時隱藏）
      const rng = new Phaser.Math.RandomDataGenerator(['tr42']);
      const treeGfx = this.add.graphics().setDepth(4);
      if (!state.mapData?.terrain?.length) {
      for(let i=0;i<220;i++){
        const tx = rng.between(80,CFG.MAP_W-80);
        const ty = rng.between(80,CFG.MAP_H-80);
        const tr = rng.between(12,28);
        const baseColors = [0x3d7a1a,0x4a8f20,0x358014,0x52a028];
        const topColors  = [0x5aa832,0x68c040,0x4daa20,0x72c840];
        treeGfx.fillStyle(rng.pick(baseColors),1);
        treeGfx.fillCircle(tx,ty,tr);
        treeGfx.fillStyle(rng.pick(topColors),0.8);
        treeGfx.fillCircle(tx-tr*0.2,ty-tr*0.25,tr*0.6);
        // trunk
        treeGfx.fillStyle(0x7a4f2a,1);
        treeGfx.fillRect(tx-3,ty+tr-4,6,8);
      }
      } // end if (!terrain)

      // ── Zone graphics ──
      this.zoneGfx = this.add.graphics().setDepth(5);

      // ── Local player: shadow + sprite ──
      const cx = state.spawnX || CFG.MAP_W/2;
      const cy = state.spawnY || CFG.MAP_H/2;

      // Shadow (depth just below player)
      this.playerShadow = this.add.image(cx, cy+22, 'shadow').setDepth(9).setAlpha(0.7);

      // Hero sprite — start with idle texture
      this.localPlayer = this.physics.add.image(cx, cy, 'hero_f0')
        .setCollideWorldBounds(true)
        .setDepth(10)
        .setOrigin(0.5, 1);   // 腳底錨點，換幀時座標不偏移
      this._heroFrame  = 0;
      this._heroTick   = 0;
      this._heroMoving = false;

      this._facing = 'right';

      // Name label
      this.localLabel = this.add.text(cx, cy-32, state.myName, {
        fontFamily:'Rajdhani', fontSize:'14px',
        color:'#ffffff', stroke:'#1a3a6e', strokeThickness:4,
        shadow:{ x:0, y:1, color:'#000', blur:4, fill:true },
      }).setOrigin(0.5,1).setDepth(11);

      // ── Camera ──
      if (this.wallGroup) this.physics.add.collider(this.localPlayer, this.wallGroup);
      this.cameras.main
        .setBounds(0,0,CFG.MAP_W,CFG.MAP_H)
        .startFollow(this.localPlayer,true,0.09,0.09)
        .setZoom(1);
      this.scale.on('resize',sz=>{
        this.cameras.main.setSize(sz.width,sz.height);
      });

      // ── Fog (reduced opacity for brighter feel) ──
      this.fog = this.add.graphics().setDepth(50).setScrollFactor(0);

      // ── Input ──
      this.keys = this.input.keyboard.addKeys({
        W:Phaser.Input.Keyboard.KeyCodes.W,
        A:Phaser.Input.Keyboard.KeyCodes.A,
        S:Phaser.Input.Keyboard.KeyCodes.S,
        D:Phaser.Input.Keyboard.KeyCodes.D,
        UP:   Phaser.Input.Keyboard.KeyCodes.UP,
        DOWN: Phaser.Input.Keyboard.KeyCodes.DOWN,
        LEFT: Phaser.Input.Keyboard.KeyCodes.LEFT,
        RIGHT:Phaser.Input.Keyboard.KeyCodes.RIGHT,
      });

      this.updateHpDisplay(state.myHp);
    }

    // ── Remote player updates from server ──
    onWorldUpdate(players) {
      const seen = new Set();
      players.forEach(p => {
        if (p.id === state.myId) return;
        seen.add(p.id);

        if (!state.remotePlayers.has(p.id)) {
          this._spawnRemote(p);
        }
        const rp = state.remotePlayers.get(p.id);

        // animation: compare new server pos vs last server pos
        const moved = Math.hypot(p.x - rp.serverX, p.y - rp.serverY) > 2;
        if(moved && rp.isAlive){
          rp.runTick++;
          if(rp.runTick % 3 === 0) rp.runFrame = (rp.runFrame+1) % 8;
          rp.sprite.setTexture('enemy_f' + rp.runFrame);
          rp.flipDir = p.x < rp.serverX;  // store flip, apply in lerp loop
        } else if(rp.isAlive) {
          rp.sprite.setTexture('enemy_f0');
        }
        // update server-reported position
        rp.serverX = p.x; rp.serverY = p.y;

        // 更新 lerp 目標（update() 每幀平滑插值）
        rp.targetX = p.x;
        rp.targetY = p.y;
        rp.hp = p.hp; rp.isAlive = p.isAlive; rp.isBot = !!p.isBot;

        // alive / ghost texture
        if(!p.isAlive){
          rp.sprite.setTexture('pghost').setAlpha(0.4).setDepth(7).setFlipX(false);
          if(rp.shadow) rp.shadow.setAlpha(0);
        } else {
          rp.sprite.setAlpha(1).setDepth(9);
          if(rp.shadow) rp.shadow.setAlpha(0.55);
        }
      });

      // Remove gone players
      state.remotePlayers.forEach((rp, id) => {
        if (!seen.has(id)) {
          rp.sprite.destroy();
          rp.nameText.destroy();
          if(rp.shadow) rp.shadow.destroy();
          state.remotePlayers.delete(id);
        }
      });
    }

    _spawnRemote(p) {
      const shadow   = this.add.image(p.x, p.y+22, 'shadow').setDepth(8).setAlpha(0.55);
      const texKey   = p.isBot ? 'enemy_f0' : 'enemy_f0';  // both same, differentiated by tint
      const sprite   = this.add.image(p.x, p.y, texKey).setDepth(9).setOrigin(0.5, 1);
      if (p.isBot) sprite.setTint(0xaaddff);  // bots have light blue tint
      const nameColor = p.isBot ? '#aaddff' : '#ffaaaa';
      const nameText = this.add.text(p.x, p.y-36, p.name||'?', {
        fontFamily:'Rajdhani', fontSize:'13px',
        color: nameColor, stroke:'#0a0c14', strokeThickness:4,
      }).setOrigin(0.5,1).setDepth(10);

      state.remotePlayers.set(p.id, {
        sprite, nameText, shadow,
        hp:p.hp, isAlive:p.isAlive, isBot:!!p.isBot,
        runFrame:0, runTick:0,
        // serverX/Y = last server-reported position (for direction calc)
        serverX:p.x, serverY:p.y,
        // targetX/Y = lerp destination
        targetX:p.x, targetY:p.y,
      });
    }

    setPaused(v) { this.isPaused = v; }

    correctPosition(x, y) {
      this.localPlayer.setPosition(x, y);
    }

    spectateMove(x, y) {
      this.tweens.add({
        targets: this.localPlayer, x, y, duration:220, ease:'Linear',
      });
    }

    onBattleStart({ battleId, opponentName, question }) {
      state.isLocked = true; state.inBattle = true;
      this.localPlayer.setVelocity(0,0);
      showBattleUI(battleId, opponentName, question);
    }

    onBattleResult(result) {
      hideBattleUI(result);
    }

    _buildTerrain() {
      if (!state.mapData?.terrain?.length) return;
      const { terrain, tileSize } = state.mapData;
      const ts  = tileSize || 32;
      const gfx = this.terrainGfx;
      if (!gfx) return;
      gfx.clear();

      const STYLE = {
        g:{base:0x4a8c28,hi:0x62aa38,lo:0x3a7020},
        w:{base:0x1a6eb5,hi:0x3a9ad4,lo:0x0d4a80},
        m:{base:0x7a6448,hi:0x9a8460,lo:0x5a4830},
        t:{base:0x2d6b1a,hi:0x3d8a22,lo:0x1e4a10},
        f:{base:0x1e5010,hi:0x2a6a18,lo:0x123008},
        b:{base:0xb07040,hi:0xd09060,lo:0x805020},
        r:{base:0xc8a84e,hi:0xdec070,lo:0xa08030},
        v:{base:0xb07040,hi:0xd09060,lo:0x805020},
      };

      terrain.forEach(([gx, gy, tileId]) => {
        const px = gx*ts, py = gy*ts;
        const k  = (tileId||'g')[0];
        const s  = STYLE[k] || STYLE.g;
        gfx.fillStyle(s.base,1);  gfx.fillRect(px,py,ts,ts);
        gfx.fillStyle(s.hi,0.5);  gfx.fillRect(px,py,ts,Math.ceil(ts*.25));
        gfx.fillStyle(s.lo,0.4);  gfx.fillRect(px,py+Math.floor(ts*.75),ts,Math.ceil(ts*.25));
        if (k==='m') {
          gfx.fillStyle(0xc0b090,.7);
          gfx.fillTriangle(px+ts/2,py+2,px+2,py+ts-2,px+ts-2,py+ts-2);
          gfx.fillStyle(0xf0f0ff,.85);
          gfx.fillTriangle(px+ts/2,py+2,px+ts/2-5,py+12,px+ts/2+5,py+12);
        } else if (k==='w') {
          gfx.fillStyle(0x80d0ff,.35);
          gfx.fillRect(px+2,py+ts*.3,ts-4,3);
          gfx.fillRect(px+4,py+ts*.6,ts-8,3);
        } else if (k==='t'||k==='f') {
          const cr=ts*.35;
          gfx.fillStyle(k==='f'?0x1a5010:0x2a7018,1);
          gfx.fillCircle(px+ts/2,py+ts*.4,cr);
          gfx.fillStyle(k==='f'?0x2a6818:0x3a9024,.8);
          gfx.fillCircle(px+ts/2-3,py+ts*.35,cr*.7);
        } else if (k==='b') {
          gfx.fillStyle(0xc03020,1);
          gfx.fillTriangle(px+2,py+ts*.5,px+ts/2,py+4,px+ts-2,py+ts*.5);
          gfx.fillStyle(0xe0c090,1);
          gfx.fillRect(px+6,py+ts*.5,ts-12,ts*.45);
        } else if (k==='r') {
          gfx.fillStyle(0xfff0a0,.6);
          gfx.fillRect(px+ts/2-1,py,2,ts);
        }
      });
    }

    _buildWalls() {
      if (!state.mapData) return;
      const { walls, tileSize } = state.mapData;
      const ts  = tileSize || 32;
      const gfx = this.wallGfx;
      if (!gfx) return;
      gfx.clear();
      this.wallGroup.clear(true, true);

      const terrainSet = new Set((state.mapData.terrain||[]).map(([gx,gy])=>gx+','+gy));
      const wSet = state.wallTiles;

      walls.forEach(([gx, gy]) => {
        const px=gx*ts, py=gy*ts;
        if (!terrainSet.has(gx+','+gy)) {
          gfx.fillStyle(0x3d4f5c,1); gfx.fillRect(px,py,ts,ts);
          if (!wSet?.has(gx+','+(gy-1))) {
            gfx.fillStyle(0x6b8394,1); gfx.fillRect(px+1,py+1,ts-2,3);
          }
          gfx.fillStyle(0x1e2d35,.5);
          gfx.fillRect(px+ts-3,py,3,ts);
          gfx.fillRect(px,py+ts-3,ts,3);
        }
        const body = this.add.rectangle(px+ts/2,py+ts/2,ts,ts).setVisible(false);
        this.physics.add.existing(body,true);
        this.wallGroup.add(body);
      });

      if (state.mapData.portals) {
        state.mapData.portals.forEach(p => {
          const px2=p.gx*ts, py2=p.gy*ts;
          gfx.fillStyle(0xb040ff,.25); gfx.fillRect(px2,py2,ts,ts);
          gfx.lineStyle(2,0xb040ff,.6); gfx.strokeRect(px2+1,py2+1,ts-2,ts-2);
        });
      }
    }

    onKnockback(pos) {
      this.tweens.killTweensOf(this.localPlayer);
      const sp=this.localPlayer, dx=pos.x-sp.x, dy=pos.y-sp.y;
      const dist=Math.hypot(dx,dy)||1;
      sp.setVelocity((dx/dist)*900,(dy/dist)*900);
      this.time.delayedCall(350,()=>{ if(sp.active){sp.setVelocity(0,0);} state.isLocked=false; });
    }

    updateHpDisplay(hp) {
      for(let i=0;i<CFG.MAX_HP;i++){
        const h = document.getElementById(`heart_${i}`);
        if(h) h.className = 'hp-heart ' + (i<hp?'alive':'dead');
      }
      if(hp<=2 && this.cameras?.main) {
        this.cameras.main.shake(320, 0.005*(3-hp));
      }
    }

    update(time) {
      if(!this.localPlayer) return;

      let vx=0, vy=0;
      if(!state.isLocked && !this.isPaused && state.isAlive) {
        [vx,vy] = this._move();
      } else {
        this.localPlayer.setVelocity(0,0);
      }

      const moving = (vx!==0||vy!==0) && state.isAlive && !state.isLocked;

      // ── Hero animation: independent canvas frames, no setCrop ──
      if(moving){
        this._heroTick++;
        if(this._heroTick % 4 === 0) this._heroFrame = (this._heroFrame+1) % 8;
        this.localPlayer.setTexture('hero_f' + this._heroFrame);
        this._heroMoving = true;
      } else if(this._heroMoving) {
        this._heroFrame = 0; this._heroTick = 0;
        this.localPlayer.setTexture('hero_f0');
        this._heroMoving = false;
      }

      // Flip sprite based on horizontal direction
      if(vx < 0) { this.localPlayer.setFlipX(true);  this._facing='left'; }
      if(vx > 0) { this.localPlayer.setFlipX(false); this._facing='right'; }

      // Shadow follows player
      if(this.playerShadow){
        this.playerShadow.setPosition(this.localPlayer.x, this.localPlayer.y+22);
        // squish shadow when moving
        this.playerShadow.setScale(moving?1.1:0.9, moving?0.7:0.9);
      }

      // Name label
      this.localLabel.setPosition(this.localPlayer.x, this.localPlayer.y-36);

      // Sync to server
      if(time - this.lastSync > CFG.SYNC_MS && !state.isLocked && !this.isPaused && state.isAlive) {
        this.lastSync = time;
        socket.emit('player:move',{
          x: this.localPlayer.x,
          y: this.localPlayer.y,
          timestamp: Date.now(),
        });
      }

      if(!state.isLocked && state.isAlive) this._highlightNear();

      this._drawFog();
      this._drawZone();
      this._drawMinimap();
    }

    _move() {
      const k = this.keys, sp = CFG.SPEED;
      let vx=0, vy=0;
      if(k.A.isDown||k.LEFT.isDown)  vx-=1;
      if(k.D.isDown||k.RIGHT.isDown) vx+=1;
      if(k.W.isDown||k.UP.isDown)    vy-=1;
      if(k.S.isDown||k.DOWN.isDown)  vy+=1;
      if(vx&&vy){ vx*=0.7071; vy*=0.7071; }
      this.localPlayer.setVelocity(vx*sp, vy*sp);
      return [vx,vy];
    }

    _highlightNear() {
      const mx=this.localPlayer.x, my=this.localPlayer.y;
      // ── Lerp remote players every frame ──
      const LERP = 0.15;
      state.remotePlayers.forEach(rp=>{
        if(rp.targetX !== undefined) {
          const dx = rp.targetX - rp.sprite.x;
          const dy = rp.targetY - rp.sprite.y;
          // snap when very close to avoid micro-jitter
          if(Math.abs(dx) < 0.5) { rp.sprite.x = rp.targetX; }
          else { rp.sprite.x += dx * LERP; }
          if(Math.abs(dy) < 0.5) { rp.sprite.y = rp.targetY; }
          else { rp.sprite.y += dy * LERP; }
          // apply flip direction from server update
          if(rp.flipDir !== undefined) rp.sprite.setFlipX(rp.flipDir);
          rp.nameText.setPosition(rp.sprite.x, rp.sprite.y - 36);
          if(rp.shadow) rp.shadow.setPosition(rp.sprite.x, rp.sprite.y + 22);
        }
        if(!rp.isAlive) return;
        const d=Math.hypot(rp.sprite.x-mx, rp.sprite.y-my);
        if(d < CFG.COLLISION_D*2.2) rp.sprite.setTint(0xffff44);
        else rp.sprite.clearTint();
      });
    }

    _drawFog() {
      this.fog.clear();
      if(state.isSpectating) return;
      const W=this.cameras.main.width, H=this.cameras.main.height;
      const cx=W/2, cy=H/2, R=CFG.FOG_R;

      // strokeCircle 環帶法：從外到內，alpha 平方漸減，中心接近透明
      const STEPS = 36;
      const ringW = (R / STEPS) + 1;
      for (let i = STEPS; i >= 1; i--) {
        const t     = i / STEPS;
        const r     = R * t;
        const alpha = Math.pow(t, 2) * 0.88;
        this.fog.lineStyle(ringW, 0x000000, alpha);
        this.fog.strokeCircle(cx, cy, r);
      }
      // 視野外補全黑
      const cornerR = Math.ceil(Math.hypot(W, H));
      const gapW    = cornerR - R + 4;
      this.fog.lineStyle(gapW, 0x000000, 0.9);
      this.fog.strokeCircle(cx, cy, R + gapW / 2);
    }
    _drawZone() {
      this.zoneGfx.clear();
      if(!state.zoneData) return;
      const {centerX:cx,centerY:cy,currentRadius:r} = state.zoneData;
      // Danger fill (outside ring)
      this.zoneGfx.fillStyle(0x5500aa,0.12);
      this.zoneGfx.fillRect(0,0,CFG.MAP_W,CFG.MAP_H);
      // Overwrite inside with clear
      this.zoneGfx.fillStyle(0x000000,0);
      this.zoneGfx.fillCircle(cx,cy,r);
      // Ring border
      this.zoneGfx.lineStyle(3,0xb040ff,0.9);
      this.zoneGfx.strokeCircle(cx,cy,r);
    }

    _drawMinimap() {
      const ctx=this.mmCtx, sc=CFG.MM_SCALE, sz=148;
      ctx.clearRect(0,0,sz,sz);
      ctx.fillStyle='#1e3010'; ctx.fillRect(0,0,sz,sz);

      if(state.zoneData){
        const {centerX:cx,centerY:cy,currentRadius:r}=state.zoneData;
        ctx.beginPath(); ctx.arc(cx*sc,cy*sc,r*sc,0,Math.PI*2);
        ctx.strokeStyle='rgba(176,64,255,0.7)'; ctx.lineWidth=1.5; ctx.stroke();
      }

      state.remotePlayers.forEach(rp=>{
        ctx.beginPath();
        ctx.arc(rp.sprite.x*sc,rp.sprite.y*sc, rp.isAlive?2.5:1.5, 0,Math.PI*2);
        ctx.fillStyle=rp.isAlive?'#ff6b6b':'rgba(255,255,255,0.2)';
        ctx.fill();
      });

      if(this.localPlayer){
        const px=this.localPlayer.x*sc, py=this.localPlayer.y*sc;
        ctx.beginPath(); ctx.arc(px,py,3.5,0,Math.PI*2);
        ctx.fillStyle='#4dabf7'; ctx.fill();
        // Glow
        ctx.beginPath(); ctx.arc(px,py,6,0,Math.PI*2);
        ctx.fillStyle='rgba(77,171,247,0.15)'; ctx.fill();
      }
    }
  }

  phaserGame = new Phaser.Game({
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    parent: 'game-container',
    backgroundColor: '#3d5c28',
    physics: {
      default: 'arcade',
      arcade: { gravity:{y:0}, debug:false },
    },
    scale: {
      mode: Phaser.Scale.RESIZE,
      autoCenter: Phaser.Scale.CENTER_BOTH,
    },
    scene: [GameScene],
  });
}

// ═══════════════════════════════════════════
//  BATTLE UI
// ═══════════════════════════════════════════
function showBattleUI(battleId, opponentName, question) {
  const overlay = document.getElementById('battle-overlay');
  document.getElementById('battle-opponent-name').textContent = opponentName;
  document.getElementById('question-text').textContent = question.text;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const labels = ['A','B','C','D'];

  question.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${labels[i]}</span>${esc(opt.text)}`;
    btn.onclick = () => submitAnswer(battleId, opt.id, btn, grid);
    grid.appendChild(btn);
  });

  overlay.classList.add('active');

  // Timer bar
  const fill = document.getElementById('battle-timer-fill');
  fill.style.transition = 'none';
  fill.style.transform  = 'scaleX(1)';
  requestAnimationFrame(() => {
    fill.style.transition = `transform ${CFG.BATTLE_MS}ms linear`;
    fill.style.transform  = 'scaleX(0)';
  });

  state.battleTimerRef = setTimeout(() => {
    if(state.inBattle) submitAnswer(battleId, null, null, grid);
  }, CFG.BATTLE_MS);
}

function submitAnswer(battleId, answerId, clickedBtn, grid) {
  if(!state.inBattle) return;
  clearTimeout(state.battleTimerRef);
  if(clickedBtn) clickedBtn.classList.add('selected');
  grid.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  socket.emit('battle:answer', { battleId, answerId, clientTimestamp: Date.now() });
}

function hideBattleUI({ winnerId, loserId, correctAnswer, loserNewHp, loserEliminated }) {
  document.getElementById('battle-overlay').classList.remove('active');

  // Mark correct/wrong options
  const grid = document.getElementById('options-grid');
  const opts = ['a','b','c','d'];
  grid.querySelectorAll('.option-btn').forEach((btn,i) => {
    if(opts[i] === correctAnswer) btn.classList.add('correct');
    else if(btn.classList.contains('selected')) btn.classList.add('wrong');
  });

  const toast = document.getElementById('battle-result-toast');
  const main  = document.getElementById('result-main');
  const sub   = document.getElementById('result-sub');
  const iWin  = winnerId === state.myId;

  main.className   = 'result-main ' + (iWin ? 'win' : 'lose');
  main.textContent = iWin ? 'WIN' : 'LOSE';
  sub.textContent  = iWin
    ? '答題正確！對手失去一滴血 ❤'
    : (loserNewHp !== null ? `失去一滴血，剩餘 ${loserNewHp} 滴` : '超時未作答');

  toast.classList.add('show');

  if(loserEliminated && loserId === state.myId) {
    setTimeout(()=>{ toast.classList.remove('show'); }, 1600);
  } else {
    setTimeout(()=>{ toast.classList.remove('show'); }, 2400);
  }
}

// ═══════════════════════════════════════════
//  HP DISPLAY
// ═══════════════════════════════════════════
function buildHpDisplay() {
  const c = document.getElementById('hp-display');
  c.innerHTML = '';
  const svg = `<svg viewBox="0 0 24 24"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>`;
  for(let i=0;i<CFG.MAX_HP;i++){
    const d=document.createElement('div');
    d.className='hp-heart alive'; d.innerHTML=svg; d.id=`heart_${i}`;
    c.appendChild(d);
  }
}

// ═══════════════════════════════════════════
//  ELIMINATED / SPECTATE
// ═══════════════════════════════════════════
function showEliminatedUI(spectateTargets) {
  const elim = document.getElementById('eliminated-overlay');
  elim.classList.add('active');
  setTimeout(()=>{ elim.style.pointerEvents='none'; }, 3000);

  const panel = document.getElementById('spectate-panel');
  panel.classList.add('active');

  const cont = document.getElementById('spectate-targets');
  cont.innerHTML = '';
  spectateTargets.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'spectate-btn';
    btn.textContent = t.name;
    btn.onclick = () => {
      state.spectateTargetId = t.id;
      socket.emit('spectate:follow',{targetId:t.id});
      document.querySelectorAll('.spectate-btn').forEach(b=>b.classList.remove('active-spectate'));
      btn.classList.add('active-spectate');
    };
    cont.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
//  ZONE TIMER
// ═══════════════════════════════════════════
function updateZoneTimer(shrinkAt) {
  document.getElementById('zone-timer').classList.add('visible');
  const el = document.getElementById('zone-countdown');
  if(state.zoneTimerRef) clearInterval(state.zoneTimerRef);
  state.zoneTimerRef = setInterval(()=>{
    const rem = Math.max(0, Math.ceil((shrinkAt - Date.now())/1000));
    el.textContent = rem + 's';
    if(rem<=0) clearInterval(state.zoneTimerRef);
  }, 500);
}

// ═══════════════════════════════════════════
//  ZONE WARNING
// ═══════════════════════════════════════════
function triggerZoneWarning() {
  const w = document.getElementById('zone-warning');
  w.classList.add('active');
  setTimeout(()=>w.classList.remove('active'), 3000);
}

// ═══════════════════════════════════════════
//  KILL FEED
// ═══════════════════════════════════════════
function addKillFeed(html, isSelf=false) {
  const feed = document.getElementById('kill-feed');
  const el   = document.createElement('div');
  el.className = 'kill-entry';
  el.innerHTML = isSelf ? `<strong style="color:var(--red)">${html}</strong>` : html;
  feed.appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}

// ═══════════════════════════════════════════
//  ANNOUNCEMENT
// ═══════════════════════════════════════════
function showAnnouncement(msg) {
  const b = document.getElementById('announcement-banner');
  b.textContent = '📢 ' + msg;
  b.style.display = 'block';
  setTimeout(()=>{ b.style.display='none'; }, 5000);
}

// ═══════════════════════════════════════════
//  WINNER SCREEN
// ═══════════════════════════════════════════
function showWinnerScreen(name, isMe) {
  const ws = document.getElementById('winner-screen');
  document.getElementById('winner-name').textContent = name + (isMe?' (YOU!)':'');
  ws.classList.add('active');
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Focus name input on load
window.addEventListener('load', ()=> document.getElementById('name-input').focus());
</script>
